name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint:check
      
      - name: Run unit tests
        run: npm test
      
      - name: Setup test session directories
        run: |
          mkdir -p ~/.copilot/session-state
          mkdir -p ~/.claude/projects
          mkdir -p ~/.pi/agent/sessions
      
      - name: Generate test session data (all sources)
        run: |
          node __tests__/fixtures/generate-test-session.js
          node __tests__/fixtures/create-multi-source-mock.js
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Verify test session generation
        run: |
          echo "📊 Copilot sessions:"
          ls -la ~/.copilot/session-state/ | head -10
          echo "📊 Claude sessions:"
          ls -la ~/.claude/projects/ 2>/dev/null || echo "No Claude sessions"
          echo "📊 Pi-Mono sessions:"
          ls -la ~/.pi/agent/sessions/ 2>/dev/null || echo "No Pi-Mono sessions"
      
      - name: Run E2E tests
        run: |
          export COPILOT_SESSION_DIR="$HOME/.copilot/session-state"
          export CLAUDE_SESSION_DIR="$HOME/.claude/projects"
          export PI_MONO_SESSION_DIR="$HOME/.pi/agent/sessions"
          npm run test:e2e
        env:
          PORT: 3838
      
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
